name: CI/CD — Test, Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # STEP 1: Backend Tests
  # ─────────────────────────────────────────
  test-backend:
    name: 🧪 Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Run Jest tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_key_for_ci
          # Tests use mocked DB so DATABASE_URL not needed

  # ─────────────────────────────────────────
  # STEP 2: Frontend Tests
  # ─────────────────────────────────────────
  test-frontend:
    name: 🧪 Run Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run React tests
        run: cd frontend && npm test

  # ─────────────────────────────────────────
  # STEP 3: Build Docker Images & Push to DockerHub
  # Only runs on main branch push (not PRs)
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/limi-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/limi-backend:${{ github.sha }}

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/limi-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/limi-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SOCKET_URL=${{ secrets.VITE_SOCKET_URL }}

  # ─────────────────────────────────────────
  # STEP 4: Deploy to Railway
  # ─────────────────────────────────────────
  deploy-railway:
    name: 🚀 Deploy to Railway
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend to Railway
        run: railway up --service limi-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Frontend to Railway
        run: railway up --service limi-frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}