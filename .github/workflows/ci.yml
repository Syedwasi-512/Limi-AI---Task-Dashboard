name: CI/CD - Test, Build and Deploy

on:
  push:
    branches: [main]

jobs:
  # STEP 1: Pehle Backend ke Tests chalenge
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout karo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run Jest Tests
        run: |
          cd backend
          npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # STEP 2: Agar tests pass honge, to images banengi aur deploy hongi
  build-and-deploy:
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout karo
        uses: actions/checkout@v4

      - name: DockerHub login karo
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Frontend Image Build & Push
      - name: Frontend image banao or push karo
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: hassan514/limi-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      # Backend Image Build & Push
      - name: Backend image banao aur push karo
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: hassan514/limi-backend:latest

      # Railway Redeploy (GraphQL API ke zariye)
      - name: Railway Backend Redeploy
        run: |
          curl -G https://backboard.railway.app/graphql/v2 \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
          --data-urlencode 'query=mutation { serviceInstanceRedeploy(serviceId: "e148e3e1-3202-4c20-93b0-15ff65ae19c6") }'

      - name: Railway Frontend Redeploy
        run: |
          curl -G https://backboard.railway.app/graphql/v2 \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
          --data-urlencode 'query=mutation { serviceInstanceRedeploy(serviceId: "0893c759-e0e0-4cd2-84ea-73d262db80a3") }'