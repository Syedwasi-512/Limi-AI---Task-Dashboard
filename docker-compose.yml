version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: limi_postgres
    environment:
      POSTGRES_DB: limi_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: limi_backend
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: limi_dashboard
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: limi_super_secret_jwt_key_2024
      CLIENT_URL: http://localhost:5173
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: limi_frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
